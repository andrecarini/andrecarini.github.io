<!-- ── FOUC-free theme + motion init ───────────────────────────────────
     Inline on purpose: runs before first paint so the <html>
     data-theme / data-motion attributes land in the CSSOM before any
     background pixel is committed. external scripts would flicker. -->
<script>
(function () {
  // Theme
  var t;
  try { t = localStorage.getItem('portfolio-bg-theme'); } catch (e) {}
  if (t !== 'light' && t !== 'dark') {
    try {
      t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    } catch (e) { t = 'dark'; }
  }
  document.documentElement.dataset.theme = t;

  // Motion — honour prefers-reduced-motion on first load
  var m;
  try { m = localStorage.getItem('portfolio-bg-motion'); } catch (e) {}
  if (m !== 'on' && m !== 'off') {
    try {
      m = matchMedia('(prefers-reduced-motion: reduce)').matches ? 'off' : 'on';
    } catch (e) { m = 'on'; }
  }
  document.documentElement.dataset.motion = m;
})();
</script>
